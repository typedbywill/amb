<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Android Mic Bridge</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="/main.js" defer></script>
  </head>
  <body class="dark-theme">
    <div class="app-container">
      <!-- HEADER -->
      <header class="app-header">
        <div class="logo-container">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" width="24" height="24">
              <path fill="currentColor" d="M12 2A3 3 0 0 0 9 5v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3m7 9a7 7 0 0 1-14 0h2a5 5 0 0 0 10 0h2m-6 9v2h-2v-2a7 7 0 0 1-5.9-6.9h2c.5 2.8 2.9 5 5.9 5s5.4-2.2 5.9-5h2A7 7 0 0 1 13 20Z"/>
            </svg>
          </div>
          <div class="logo-text">
            <h1>miccpy</h1>
            <span class="sub-title">Android Mic Bridge</span>
          </div>
        </div>
        <div class="header-actions">
          <button id="theme-toggle" class="icon-btn" title="Alternar tema">
            <!-- Sun / Moon Icon will be injected via JS -->
            <svg id="theme-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
          <span id="connection-badge" class="badge disconnected">Desconectado</span>
        </div>
      </header>

      <!-- MAIN CONTENT -->
      <main class="app-main">
        
        <!-- CARD: CONEXÃO -->
        <section class="card connection-card">
          <h2>Conexão</h2>
          
          <div class="tabs">
            <button id="tab-usb" class="tab-btn active">USB (ADB)</button>
            <button id="tab-wifi" class="tab-btn">Wi-Fi</button>
          </div>

          <!-- Conteúdo Aba USB -->
          <div id="panel-usb" class="tab-panel active">
            <div class="form-group">
              <label for="adb-device-select">Dispositivo Android</label>
              <div class="select-wrapper">
                <select id="adb-device-select">
                  <option value="">Aguardando detecção...</option>
                </select>
                <button id="refresh-adb-btn" class="icon-btn" title="Atualizar dispositivos">
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <!-- Conteúdo Aba Wi-Fi -->
          <div id="panel-wifi" class="tab-panel">
            <div class="form-group">
              <label for="wifi-ip-input">Endereço IP do Celular</label>
              <input type="text" id="wifi-ip-input" placeholder="Ex: 192.168.1.100" />
            </div>
          </div>

          <div class="form-row-2">
            <div class="form-group">
              <label for="port-input">Porta TCP</label>
              <input type="number" id="port-input" value="61394" min="1024" max="65535" />
            </div>
            <div class="form-group">
              <label for="codec-select">Codec</label>
              <select id="codec-select">
                <option value="opus">Opus (Recomendado)</option>
                <option value="pcm">PCM (Sem Compressão)</option>
              </select>
            </div>
          </div>

          <button id="action-btn" class="primary-btn">Iniciar Microfone</button>
        </section>

        <!-- CARD: CONFIGURAÇÃO DE ÁUDIO -->
        <section class="card audio-card">
          <h2>Áudio e Saída</h2>

          <div class="form-group">
            <label for="audio-device-select">Dispositivo de Reprodução (PC)</label>
            <div class="select-wrapper">
              <select id="audio-device-select">
                <option value="">Carregando dispositivos...</option>
              </select>
              <button id="refresh-audio-btn" class="icon-btn" title="Atualizar saídas">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="switch-group">
            <label class="switch-container">
              <input type="checkbox" id="virtual-mic-toggle" />
              <span class="switch-slider"></span>
            </label>
            <div class="switch-label">
              <strong>Microfone Virtual (VB-Cable)</strong>
              <p class="switch-desc">Redireciona o som diretamente para o microfone virtual do Windows.</p>
            </div>
          </div>

          <div class="form-group">
            <div class="slider-header">
              <label for="volume-slider">Ganho Digital</label>
              <span id="volume-val">1.0x</span>
            </div>
            <input type="range" id="volume-slider" min="0" max="3" step="0.1" value="1.0" class="slider" />
          </div>

          <!-- LEVEL METER (Indicador de volume dinâmico) -->
          <div class="meter-container">
            <div class="meter-bar-wrapper">
              <div id="meter-bar" class="meter-bar"></div>
            </div>
            <span class="meter-label">Nível do Sinal</span>
          </div>
        </section>

        <!-- CARD: MONITORAMENTO -->
        <section class="card monitor-card">
          <h2>Monitor de Conexão</h2>
          <div class="monitor-grid">
            <div class="monitor-item">
              <span class="monitor-val" id="stat-bandwidth">0.0 kbps</span>
              <span class="monitor-lbl">Largura de Banda</span>
            </div>
            <div class="monitor-item">
              <span class="monitor-val" id="stat-buffer">0 ms</span>
              <span class="monitor-lbl">Atraso do Buffer</span>
            </div>
            <div class="monitor-item">
              <span class="monitor-val" id="stat-lost">0</span>
              <span class="monitor-lbl">Pacotes Perdidos</span>
            </div>
          </div>
          <div id="status-message" class="status-msg">
            Pronto para conectar.
          </div>
        </section>

      </main>
    </div>
  </body>
</html>
